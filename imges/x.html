<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    body {
        font-family: Arial, sans-serif;
        background-color: #f5f5f5;
    }

    nav {
        display: flex;
        justify-content: space-between;
        align-items: center;
        background-color: #333;
        padding: 15px 30px;
    }

    .logo {
        color: white;
        font-size: 1.5rem;
        font-weight: bold;
    }

    nav ul {
        display: flex;
        gap: 20px;
        list-style: none;
    }

    nav ul li a {
        color: white;
        text-decoration: none;
    }

    nav ul li a:hover {
        color: #f0c040;
    }

    h2 {
        text-align: center;
        margin: 30px 0 15px;
    }

    .gallery {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 15px;
        padding: 20px;
    }

    .card {
        background-color: white;
        border: 1px solid #ccc;
        border-radius: 8px;
        overflow: hidden;
    }

    .card:first-child {
        grid-column: span 2;
    }

    .card img {
        width: 100%;
        max-width: 100%;
        height: auto;
        display: block;
    }

    .card p {
        padding: 10px;
        font-size: 0.9rem;
        color: #555;
    }

    @media (max-width: 768px) {
        .gallery {
            grid-template-columns: repeat(2, 1fr);
        }
    }

    @media (max-width: 480px) {
        nav {
            flex-direction: column;
            gap: 10px;
        }

        nav ul {
            flex-direction: column;
            align-items: center;
        }

        .gallery {
            grid-template-columns: 1fr;
        }

        .card:first-child {
            grid-column: span 1;
        }
    }
</style>
<body>
<nav>
    <div class="logo">MyWebsite</div>
    <ul>
        <li><a href="#">Home</a></li>
        <li><a href="#">About</a></li>
        <li><a href="#">Services</a></li>
        <li><a href="#">Contact</a></li>
    </ul>
</nav>

<h2>Photo Gallery</h2>
<div class="gallery">
    <div class="card">
        <img src="https://picsum.photos/seed/1/600/300" alt="photo1" />
        <p>Card 1 - spans 2 columns</p>
    </div>
    <div class="card">
        <img src="https://picsum.photos/seed/2/300/200" alt="photo2" />
        <p>Card 2</p>
    </div>
    <div class="card">
        <img src="https://picsum.photos/seed/3/300/200" alt="photo3" />
        <p>Card 3</p>
    </div>
    <div class="card">
        <img src="https://picsum.photos/seed/4/300/200" alt="photo4" />
        <p>Card 4</p>
    </div>
    <div class="card">
        <img src="https://picsum.photos/seed/5/300/200" alt="photo5" />
        <p>Card 5</p>
    </div>
    <div class="card">
        <img src="https://picsum.photos/seed/6/300/200" alt="photo6" />
        <p>Card 6</p>
    </div>
</div>
</body>
</html>
